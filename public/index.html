<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncRutube</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <header class="header-class">
        <h1>🎬 SyncRutube</h1>
        <nav class="nav">
            <a href="#">Главная</a>
            <a href="#">Мои комнаты</a>
            <a href="#">О сервисе</a>
        </nav>
    </header>
    <div class="page">
        <div class="info-bar">
            <div class="info-item">
                <span class="info-label">КОМНАТА</span>
                <span class="info-value room-code">ABC123</span>
            </div>
            <div class="info-item">
                <span class="info-label">ВЫ</span>
                <span class="info-value role">
                    👑 Хост
                </span>
            </div>
            <div class="info-item">
                <span class="info-label">ОНЛАЙН</span>
                <span class="info-value online">
                    <span class="dot green"></span>
                </span>
            </div>
            <div class="info-item">
                <span class="info-label">СТАТУС</span>
                <span class="info-value sync">
                    <span class="bars"></span>
                    Синхронизировано
                </span>
            </div>

            <button class="ghost-btn">⚙ Настройки комнаты</button>
            <button class="danger-btn">⎋ Покинуть комнату</button>
        </div>
        <main class="main-layout">
            <section class="container">
                <div class="video-wrapper">
                    <iframe id="rutube-player" allow="clipboard-write; autoplay; fullscreen" allowfullscreen
                        webkitAllowFullScreen mozallowfullscreen>
                    </iframe>
                </div>
                <div class="controls">
                    <button id="playBtn">▶ Play</button>
                    <button id="stopBtn">⏸ Pause</button>
                    <button id="syncBtn">🔄 Sync</button>
                </div>
                <div class="status-container">
                    <div class="room-status-bar">
                        <div class="room-status-item">
                            Подключено:
                            <span id="onlineCount">2</span>
                            пользователя
                        </div>
                        <div class="room-status-item">
                            ID комнаты:
                            <strong id="roomCode">ABC123</strong>
                        </div>
                        <div class="room-status-item room-status-safe">
                            🔒
                            <span id="connectionStatus">Соединение защищено</span>
                        </div>
                    </div>
                </div>
                <div class="stats-room"></div>
            </section>
            <aside class="sidebar">
                <div class="chat-container">
                    <div class="chat-header">
                        <span class="icon-emodji-chat">💬</span>
                        Чат
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message">
                            <div class="avatar"></div>
                            <div>
                                <span class="user">Alice</span>
                                <span class="text">Привет 👋</span>
                            </div>
                            <span class="time">20:15</span>
                        </div>
                        <div class="message">
                            <div class="avatar"></div>
                            <div>
                                <span class="user">User</span>
                                <span class="text">Готов смотреть</span>
                            </div>
                            <span class="time">20:15</span>
                        </div>
                        <div class="chat-input">
                            <input type="text" id="chatInput" placeholder="Написать сообщение...">
                            <button id="chatSend">
                                <svg viewBox="0 0 32 32">
                                    <path
                                        d="M29.3,2.6c-0.3-0.2-0.7-0.3-1-0.2L3,11.7c-0.4,0.1-0.7,0.5-0.7,0.9c0,0.4,0.3,0.8,0.7,0.9l10.2,3.8l10-10c0.4-0.4,1-0.4,1.4,0s0.4,1,0,1.4l-9.8,9.8l6.6,10.6c0.2,0.3,0.5,0.5,0.8,0.5c0.1,0,0.1,0,0.2,0c0.4-0.1,0.7-0.4,0.8-0.7l6.2-25.2C29.7,3.3,29.6,2.9,29.3,2.6z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="users-card">
                    <div class="users-header">Участники: 2</div>
                    <div class="user-container">
                        <div class="users-list">
                            <div class="avatar user-for-list"></div>
                            <div class="style-users">
                                <span class="user-list">User</span>
                                <span class="icon">icon</span>
                            </div>
                            <span class="user-state watch">Смотрит</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/client.js"></script>
</body>

</html>
