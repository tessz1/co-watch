<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SyncRutube</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div class="container">
        <h1>🎬 SyncRutube</h1>

        <div class="room-section">
            <input id="nameRoom" type="text" placeholder="Код комнаты">
            <button id="joinBtn">Войти</button>
        </div>

        <div class="room-info">
            <div>🚪 Комната: <span id="roomDisplay">---</span></div>
            <div>👤 Роль: <span id="roleDisplay">---</span></div>
        </div>

        <div class="stats">
            <div>🕐 Моё время: <span id="myTime">00:00</span></div>
            <div>👥 Время партнёра: <span id="remoteTime">---</span></div>
        </div>

        <div class="video-url-section">
            <input type="text" id="videoUrl" placeholder="Введите ссылку на видео Rutube">
            <button id="loadVideoBtn">Загрузить видео</button>
        </div>

        <div class="video-wrapper">
            <iframe id="rutube-player" width="720" height="405" style="border: none;"
                allow="clipboard-write; autoplay; fullscreen" allowfullscreen="true" webkitAllowFullScreen="true"
                mozallowfullscreen="true">
            </iframe>
        </div>

        <div class="controls">
            <button id="playBtn">▶ Play</button>
            <button id="stopBtn">⏸ Pause</button>
            <button id="syncBtn">🔄 Sync</button>
        </div>

        <div class="status-container">
            <div id="status">Подключение...</div>
        </div>
    </div>
    <!-- 
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Написать...">
            <button id="chatSend">➤</button>
        </div>
    </div> -->

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>

</html>
