<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncRutube</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <header class="header-class">
        <h1>🎬 SyncRutube</h1>
        <nav class="nav">
            <a href="#">Главная</a>
            <a href="#">Мои комнаты</a>
            <a href="#">О сервисе</a>
        </nav>
    </header>
    <div class="page">
        <div class="info-bar">
            <div class="info-item">
                <span class="info-label">КОМНАТА</span>
                <span id="room-code" class="info-value room-code">— — —</span>
            </div>
            <div class="info-item">
                <span class="info-label">ВЫ</span>
                <span id="role" class="info-value role">
                    Вне комнаты
                </span>
            </div>
            <div class="info-item">
                <span class="info-label">ОНЛАЙН</span>
                <div class="info-value online">
                    <span class="dot green"></span>
                    <span id="online-users">0</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">СТАТУС</span>
                <span class="info-value sync">
                    <span class="bars"></span>
                    Ожидание комнаты
                </span>
            </div>

            <button id="ghost-btn" class="ghost-btn">⚙ Настройки комнаты</button>
            <button id="danger-btn" class="danger-btn">⎋ Покинуть комнату</button>
        </div>
        <main class="main-layout">
            <section class="container">
                <div class="video-wrapper">
                    <iframe id="rutube-player" allow="clipboard-write; autoplay; fullscreen" allowfullscreen
                        webkitAllowFullScreen mozallowfullscreen>
                    </iframe>
                </div>
                <div class="controls">
                    <button id="playBtn">▶ Play</button>
                    <button id="stopBtn">⏸ Pause</button>
                    <button id="syncBtn">🔄 Sync</button>
                </div>
                <div class="status-container">
                    <div class="room-status-bar">
                        <div class="room-status-item">
                            Подключено:
                            <span id="onlineCount">0</span>
                            пользователя
                        </div>
                        <div class="room-status-item">
                            ID комнаты:
                            <strong id="roomCode"></strong>
                        </div>
                        <div class="room-status-item room-status-safe">
                            🔒
                            <span id="connectionStatus">Соединение защищено</span>
                        </div>
                    </div>
                </div>
                <div class="stats-room"></div>
            </section>
            <aside class="sidebar">
                <div id="chatContainer" class="chat-container chat-locked">
                    <div class="chat-header">
                        <span class="icon-emodji-chat">💬</span>
                        Чат
                    </div>
                    <div id="chat-overlay" class="chat-overlay overlay-locked">
                        💬 Войдите в комнату, чтобы открыть чат
                    </div>
                    <div class="chat-messages" id="chatMessages">
                    </div>
                    <div id="chat-input" class="chat-input">
                        <input type="text" id="chatInput" placeholder="Написать сообщение...">
                        <button id="chatSend">
                            <svg viewBox="0 0 32 32">
                                <path
                                    d="M29.3,2.6c-0.3-0.2-0.7-0.3-1-0.2L3,11.7c-0.4,0.1-0.7,0.5-0.7,0.9c0,0.4,0.3,0.8,0.7,0.9l10.2,3.8l10-10c0.4-0.4,1-0.4,1.4,0s0.4,1,0,1.4l-9.8,9.8l6.6,10.6c0.2,0.3,0.5,0.5,0.8,0.5c0.1,0,0.1,0,0.2,0c0.4-0.1,0.7-0.4,0.8-0.7l6.2-25.2C29.7,3.3,29.6,2.9,29.3,2.6z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="users-card">
                    <div class="users-header">Участники: 2</div>
                    <div class="user-container">
                        <div id="users-list" class="users-list"></div>
                    </div>
                </div>
            </aside>
        </main>
    </div>
    <div id="modal-overlay" class="modal-overlay">
        <div class="room-modal">
            <div class="modal-top">
                <div class="modal-title">
                    ⚙ Управление комнатой
                </div>
                <button id="modal-close" class="modal-close">✕</button>
            </div>
            <div class="modal-tabs">
                <button class="tab active">Комната</button>
                <button class="tab">Видео</button>
                <button class="tab">Настройки</button>
            </div>
            <div class="modal-content">
                <label class="modal-label">Код комнаты</label>
                <input id="modal-room" type="text" placeholder="Введите код комнаты">
                <label class="modal-label">Ссылка Rutube</label>
                <input id="modal-link" type="text" placeholder="https://rutube.ru/video/...">
                <div class="modal-actions">
                    <button class="ghost-btn">Создать</button>
                    <button id="save-btn" class="primary-btn">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/client.js"></script>
</body>

</html>
